upstream api {
    server api-1:8080;
    server api-2:8080;
}

server {
    listen 9999;

    access_log off;
    error_log /dev/null crit;

    location / {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 2s;
        proxy_read_timeout 30s;
    }
}
